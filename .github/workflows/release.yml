name: 发布 Release

# 触发条件：
#   1. 推送版本 tag（如 git tag v1.1.0 && git push origin v1.1.0）
#   2. 在 GitHub Actions 页面手动触发并填写版本号
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (如 v1.1.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  release:
    name: 构建并发布 Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # 需要完整历史以生成 Release Notes

      # ── 2. 确定版本号 ───────────────────────────────────────────────────────
      - name: 确定版本号
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            PRE="${{ github.event.inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PRE="false"
          fi
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "pre=${PRE}"   >> "$GITHUB_OUTPUT"
          echo "name=Cloak Browser 自动签到助手 ${TAG}" >> "$GITHUB_OUTPUT"

      # ── 3. 手动触发时：创建并推送 tag ──────────────────────────────────────
      - name: 创建 Tag（仅手动触发时）
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 如果 tag 已存在则跳过
          if git rev-parse "$TAG" &>/dev/null; then
            echo "Tag $TAG 已存在，跳过创建。"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG 已创建并推送。"
          fi

      # ── 4. 打包发布文件 ────────────────────────────────────────────────────
      - name: 打包发布文件
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          SLUG="cloak-browser-checkin-assistant-${TAG}"
          mkdir -p dist

          # 给 run.sh 添加可执行权限（tar.gz 会保留）
          chmod +x run.sh

          # ZIP（Windows 友好）
          zip -r "dist/${SLUG}.zip" \
            checkin.py setup.py run.sh run.bat \
            config.example.json requirements.txt \
            README.md README.en.md

          # TAR.GZ（Linux / macOS 友好，保留执行权限）
          tar -czf "dist/${SLUG}.tar.gz" \
            checkin.py setup.py run.sh run.bat \
            config.example.json requirements.txt \
            README.md README.en.md

          echo "=== 发布文件 ==="
          ls -lh dist/

      # ── 5. 创建 GitHub Release ─────────────────────────────────────────────
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       ${{ steps.ver.outputs.name }}
          prerelease: ${{ steps.ver.outputs.pre == 'true' }}
          generate_release_notes: true          # 自动生成更新日志（来自提交记录）
          body: |
            ## 下载

            | 文件 | 适用平台 |
            |------|----------|
            | `*.zip` | Windows |
            | `*.tar.gz` | Linux / macOS |

            ## 快速开始

            **Linux / macOS**
            ```bash
            tar -xzf cloak-browser-checkin-assistant-*.tar.gz
            chmod +x run.sh   # tar.gz 通常已保留，此步可选
            ./run.sh
            ```

            **Windows**
            解压 `*.zip`，双击运行 `run.bat`

            首次运行会自动安装依赖并打开配置向导。
          files: |
            dist/*.zip
            dist/*.tar.gz
